name: App Store Release Metadata

on:
  workflow_dispatch:
    inputs:
      version:
        description: App Store version to release (defaults to package.json version)
        required: false
        type: string
      build_number:
        description: TestFlight build number to attach (defaults to latest processed build for the version)
        required: false
        type: string
      release_type:
        description: How the version is released once approved
        required: false
        type: choice
        default: manual
        options:
          - manual
          - automatic
          - phased
      submit_for_review:
        description: Submit for App Review after metadata upload
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-latest
    env:
      APPLE_API_KEY: ${{ vars.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      APP_IDENTIFIER: com.roshi.desktop
      FASTLANE_SKIP_UPDATE_CHECK: '1'
      FASTLANE_HIDE_CHANGELOG: '1'
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate release configuration
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          missing=()
          for var in APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_BASE64; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Validate release notes
        run: ./scripts/validate-release-notes.sh

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p .tmp
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > .tmp/AuthKey.p8
          echo "APPLE_API_KEY_PATH=${{ github.workspace }}/.tmp/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Resolve release version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            v="$(node -p "require('./package.json').version")"
            echo "value=$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Push App Store metadata
        run: |
          args=(mac release_appstore)
          args+=(version:"${{ steps.version.outputs.value }}")
          if [ -n "${{ inputs.build_number }}" ]; then
            args+=(build_number:"${{ inputs.build_number }}")
          fi
          args+=(release_type:"${{ inputs.release_type }}")
          args+=(submit_for_review:"${{ inputs.submit_for_review }}")
          bundle exec fastlane "${args[@]}"
