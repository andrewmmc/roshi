name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: Custom version, e.g. 1.2.3 or v1.2.3-beta
        required: false
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          if [[ "${{ inputs.bump }}" == "custom" ]]; then
            TARGET="${{ inputs.version }}"
          else
            TARGET="${{ inputs.bump }}"
          fi

          if [[ -z "$TARGET" ]]; then
            echo "Custom version is required when bump=custom" >&2
            exit 1
          fi

          bash ./scripts/bump-version.sh "$TARGET" --push
          VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  release:
    needs: bump
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.bump.outputs.tag }}
    secrets: inherit

  appstore-upload:
    needs:
      - bump
      - release
    uses: ./.github/workflows/appstore.yml
    with:
      ref: ${{ needs.bump.outputs.tag }}
    secrets: inherit
