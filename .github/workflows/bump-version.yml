name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: Custom version, e.g. 1.2.3 or v1.2.3-beta
        required: false
        type: string

permissions:
  contents: write

jobs:
  # Bumps all version files, commits, and pushes the tag. Pushing the tag
  # triggers ci.yml (on: push: tags: v*), which owns the release and App Store
  # upload jobs. Do NOT add release/appstore jobs here or they will run twice.
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          if [[ "${{ inputs.bump }}" == "custom" ]]; then
            TARGET="${{ inputs.version }}"
          else
            TARGET="${{ inputs.bump }}"
          fi

          if [[ -z "$TARGET" ]]; then
            echo "Custom version is required when bump=custom" >&2
            exit 1
          fi

          bash ./scripts/bump-version.sh "$TARGET" --push
          VERSION="$(node -p "require('./package.json').version")"
          echo "Pushed tag v${VERSION}; ci.yml will build the release."
