name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags:
      - 'v*'

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test with coverage
        run: npm run test:coverage

      - name: Report coverage
        if: always()
        run: node scripts/report-coverage.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Detect version tag
        id: version-tag
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=" >> "$GITHUB_OUTPUT"

      - name: Type check and build
        run: npm run build

      - name: Validate App Store release notes
        run: npm run validate:release-notes

  release:
    needs: ci
    if: needs.ci.outputs.version_tag != ''
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.ci.outputs.version_tag }}
    secrets: inherit

  appstore-upload:
    needs:
      - ci
      - release
    # Never upload pre-releases (tags containing a hyphen, e.g. v1.1.0-beta) to
    # App Store Connect.
    if: needs.ci.outputs.version_tag != '' && !contains(needs.ci.outputs.version_tag, '-')
    uses: ./.github/workflows/appstore.yml
    with:
      ref: ${{ needs.ci.outputs.version_tag }}
    secrets: inherit
