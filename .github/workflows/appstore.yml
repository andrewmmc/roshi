name: App Store Upload

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to upload (e.g., 1.0.0)'
        required: true

permissions:
  contents: read

jobs:
  upload:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Distribution certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Import Mac Installer certificate
        env:
          MAC_INSTALLER_CERTIFICATE: ${{ secrets.MAC_INSTALLER_CERTIFICATE }}
          MAC_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/installer-certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$MAC_INSTALLER_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MAC_INSTALLER_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ vars.APPLE_API_KEY }}.p8

      - name: Write provisioning profile
        run: |
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > src-tauri/embedded.provisionprofile

      - name: Set version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          cd src-tauri && cargo generate-lockfile

      - name: Verify signing identity
        env:
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "Looking for identity: $APPLE_SIGNING_IDENTITY"
          security find-identity -v -p codesigning "$RUNNER_TEMP/build.keychain"
          security find-identity -v -p codesigning "$RUNNER_TEMP/build.keychain" | grep -q "$APPLE_SIGNING_IDENTITY" || { echo "::error::Signing identity not found in keychain"; exit 1; }

      - name: Build universal binary (App Store config)
        env:
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
        run: npx tauri build --bundles app --target universal-apple-darwin --config src-tauri/tauri.appstore.conf.json

      - name: Create signed .pkg and upload to App Store Connect
        env:
          APPLE_API_KEY: ${{ vars.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ vars.APPLE_API_ISSUER }}
          MAC_INSTALLER_IDENTITY: ${{ vars.MAC_INSTALLER_IDENTITY }}
        run: |
          xcrun productbuild \
            --sign "$MAC_INSTALLER_IDENTITY" \
            --component "src-tauri/target/universal-apple-darwin/release/bundle/macos/Roshi.app" \
            /Applications \
            "Roshi.pkg"

          xcrun altool --upload-app \
            --type macos \
            --file "Roshi.pkg" \
            --apiKey "$APPLE_API_KEY" \
            --apiIssuer "$APPLE_API_ISSUER"
